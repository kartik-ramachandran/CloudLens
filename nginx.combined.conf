server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript
               application/javascript application/json application/xml;

    # Security headers
    add_header X-Content-Type-Options  "nosniff"        always;
    add_header X-XSS-Protection        "1; mode=block"  always;
    # X-Frame-Options relaxed to ALLOWALL when running embedded in CloudForge
    # Override per-deployment if needed; set SAMEORIGIN for standalone-only
    add_header X-Frame-Options         "SAMEORIGIN"     always;

    # ── Proxy /api/* → dotnet backend on :8080 ───────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Long timeout for Azure SDK calls (cost data, resources etc.)
        proxy_read_timeout    300s;
        proxy_connect_timeout  60s;
        proxy_send_timeout    300s;
    }

    # ── React SPA (all non-asset routes → index.html) ────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache for hashed static assets
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Never cache service worker
    location /service-worker.js {
        expires    off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
