<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="azureGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0078D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00BCF2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#50E6FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0078D4;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Outer lens ring -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="url(#azureGradient)" stroke-width="8" opacity="0.2"/>
  
  <!-- Main lens circle -->
  <circle cx="100" cy="100" r="60" fill="url(#azureGradient)" filter="url(#shadow)"/>
  
  <!-- Inner highlight circle -->
  <circle cx="85" cy="85" r="20" fill="white" opacity="0.3"/>
  
  <!-- Magnifying glass handle -->
  <path d="M 145 145 Q 160 160 170 175 Q 175 180 175 185 Q 175 190 170 195 Q 165 200 160 200 Q 155 200 150 195 L 140 185 Q 138 183 140 180 L 145 145" 
        fill="url(#accentGradient)" filter="url(#shadow)"/>
  
  <!-- Scan lines effect inside lens -->
  <g opacity="0.4">
    <line x1="70" y1="80" x2="130" y2="80" stroke="white" stroke-width="2" opacity="0.6"/>
    <line x1="70" y1="95" x2="130" y2="95" stroke="white" stroke-width="2" opacity="0.5"/>
    <line x1="70" y1="110" x2="130" y2="110" stroke="white" stroke-width="2" opacity="0.4"/>
  </g>
  
  <!-- Focus crosshair -->
  <g stroke="white" stroke-width="3" opacity="0.7">
    <line x1="100" y1="85" x2="100" y2="95"/>
    <line x1="100" y1="105" x2="100" y2="115"/>
    <line x1="85" y1="100" x2="95" y2="100"/>
    <line x1="105" y1="100" x2="115" y2="100"/>
  </g>
  
  <!-- Center dot -->
  <circle cx="100" cy="100" r="3" fill="white"/>
</svg>
